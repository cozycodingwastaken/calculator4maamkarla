<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Maam Karla Heheheheeh</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

<body>
    <div class="calculator">
        <input type="text" id="display" readonly>

        <div class="buttons">
            <button class="operator" data-operator="-">-</button>
            <button class="operator" data-operator="+">+</button>
            <button class="operator" data-operator="*">*</button>
            <button class="operator" data-operator="/">/</button>
            <button class="number" data-number="1">1</button>
            <button class="number" data-number="2">2</button>
            <button class="number" data-number="3">3</button>
            <button class="number" data-number="4">4</button>
            <button class="number" data-number="7">7</button>
            <button class="number" data-number="5">5</button>
            <button class="number" data-number="6">6</button>
            <button class="number" data-number="8">8</button>
            <button class="number" data-number="9">9</button>
            <button class="number" data-number="0">0</button>
            <button class="decimal" data-action="decimal">.</button>
            <button class="equals" data-action="equals">=</button>

            <button id="clear" class="clear" data-action="clear">C</button>
        </div>
        <br>
        <img class="kermit" src="img/200w.gif">
    </div>

    <!-- Password modal -->
    <div id="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; justify-content:center; align-items:center;">
        <div style="background:white; border-radius:16px; padding:24px; width:280px; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.3);">
            <p style="margin:0 0 12px; font-size:16px; font-weight:600;">Enter password to clear:</p>
            <input type="password" id="modal-input" style="width:100%; padding:8px 12px; border:1px solid #ccc; border-radius:8px; font-size:16px; box-sizing:border-box; margin-bottom:12px;">
            <p id="modal-message" style="margin:0 0 12px; font-size:14px; color:#ff3b30; display:none;"></p>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button id="modal-cancel" style="padding:8px 20px; border-radius:8px; border:none; background:#ccc; cursor:pointer; font-size:15px;">Cancel</button>
                <button id="modal-ok" style="padding:8px 20px; border-radius:8px; border:none; background:#34c759; color:white; cursor:pointer; font-size:15px;">OK</button>
            </div>
        </div>
    </div>

    <!-- GCash payment modal -->
    <div id="gcash-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; border-radius:20px; padding:28px 24px; width:300px; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,0.4);">
            <div style="background:#0070FF; border-radius:12px; padding:10px 0 6px; margin-bottom:14px;">
                <span style="color:white; font-size:22px; font-weight:800; letter-spacing:1px;">GCash</span>
            </div>
            <p style="margin:0 0 4px; font-size:15px; font-weight:700; color:#333;">Scan to pay before getting your result</p>
            <p style="margin:0 0 12px; font-size:13px; color:#888;">Amount: <strong style="color:#0070FF;">₱1.00</strong></p>
            <img src="img/gcash.jpg" alt="GCash QR" style="width:200px; height:200px; object-fit:cover; border-radius:12px; border:3px solid #0070FF; margin-bottom:14px;">
            <div id="gcash-status" style="display:none; font-size:14px; font-weight:600; margin-bottom:12px; color:#0070FF;"></div>
            <div id="gcash-buttons">
                <p style="margin:0 0 8px; font-size:13px; color:#555;">After paying, enter your GCash reference number:</p>
                <input type="text" id="gcash-ref-input" placeholder="e.g. 1234567890" maxlength="30" style="width:100%; padding:8px 12px; border:1px solid #ccc; border-radius:8px; font-size:15px; box-sizing:border-box; margin-bottom:10px; text-align:center;">
                <p id="gcash-ref-error" style="display:none; color:#ff3b30; font-size:13px; margin:0 0 10px;">Please enter your reference number first!</p>
                <button id="gcash-paid" style="width:100%; padding:12px; border-radius:12px; border:none; background:#0070FF; color:white; cursor:pointer; font-size:15px; font-weight:700; margin-bottom:8px;">I already paid!</button>
                <button id="gcash-cancel" style="width:100%; padding:10px; border-radius:12px; border:none; background:#f0f0f0; color:#555; cursor:pointer; font-size:14px;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
